# 冰主题小怪 — 15s 周期读条圆形 AOE；90s 后软超时：叠愤怒 + loop 回 15s 重演。
# TTK 目标 ~90s。

arena:
  name: 冰封洞穴
  shape: circle
  radius: 15
  boundary: wall

entities:
  boss:
    type: mob
    group: boss
    hp: 45000
    attack: 180
    speed: 3
    size: 1.2
    facing: 180
    position: { x: 0, y: 0, z: 0 }
    autoAttackRange: 4
    aggroRange: 8

player:
  position: { x: 0, y: -12, z: 0 }

boss_ai:
  chaseRange: 4
  autoAttackRange: 4
  autoAttackInterval: 3000
  aggroRange: 8

local_buffs:
  mob_enrage:
    name: 愤怒
    type: buff
    stackable: true
    maxStacks: 20
    duration: 999999
    effects:
      - { type: damage_increase, value: 0.15 }

local_skills:
  boss_auto:
    name: 冰拳
    type: ability
    targetType: single
    requiresTarget: true
    range: 4
    effects: [{ type: damage, potency: 1 }]
  frost_ring:
    name: 冰锥落下
    type: spell
    castTime: 2500
    targetType: aoe
    requiresTarget: false
    range: 0
    zones:
      - anchor: { type: caster }
        direction: { type: none }
        shape: { type: circle, radius: 6 }
        resolveDelay: 2500
        hitEffectDuration: 500
        effects:
          - { type: damage, potency: 2.5 }
  mob_enrage_stack:
    name: 愤怒叠层
    type: ability
    targetType: single
    requiresTarget: false
    range: 0
    effects:
      - { type: apply_buff, buffId: mob_enrage, target: caster }

skills: {}

phases:
  phase_default:
    actions:
      - { at: 0, action: enable_ai }
      - { at: 15000, action: use, use: frost_ring }
      - { at: 45000, action: use, use: frost_ring }
      - { at: 75000, action: use, use: frost_ring }
      - { at: 90000, action: use, use: mob_enrage_stack }
      - { at: 90001, action: loop, loop: 10000 }
